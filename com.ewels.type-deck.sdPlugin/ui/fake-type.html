<!doctype html>
<html lang="en">
  <head>
    <title>Type Deck Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }
      .help {
        display: block;
        margin: 2px 0 8px;
        color: var(--color-content-secondary, #999);
        font-size: 11px;
        line-height: 1.4;
      }
      .section {
        margin-top: 14px;
        padding-top: 6px;
        border-top: 1px solid var(--color-border, #444);
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--color-content-secondary, #999);
      }
    </style>
  </head>

  <body>
    <div class="section">Text</div>
    <sdpi-item label="Text">
      <sdpi-textarea
        setting="text"
        placeholder="Text to type when the key is pressed..."
        rows="6"
      ></sdpi-textarea>
    </sdpi-item>
    <small class="help">
      Template variables: <code>{date}</code> = YYYY-MM-DD,
      <code>{time}</code> = HH:MM:SS, <code>{clipboard}</code> = current
      clipboard text, <code>{counter}</code> = press count (increments each
      press). Use <code>{{</code> and <code>}}</code> for literal braces.
    </small>

    <div class="section">Variants</div>
    <sdpi-item label="Cycle mode">
      <sdpi-checkbox
        setting="cycleMode"
        label="Use the next line each press"
      ></sdpi-checkbox>
    </sdpi-item>
    <sdpi-item label="Random pick">
      <sdpi-checkbox
        setting="randomMode"
        label="Pick a random line each press"
      ></sdpi-checkbox>
    </sdpi-item>

    <div class="section">Long press</div>
    <sdpi-item label="Long press">
      <sdpi-checkbox
        setting="longPressEnabled"
        label="Enable separate long-press text"
      ></sdpi-checkbox>
    </sdpi-item>
    <sdpi-item label="Long-press text">
      <sdpi-textarea
        setting="longPressText"
        placeholder="Text typed when the key is held..."
        rows="3"
      ></sdpi-textarea>
    </sdpi-item>
    <sdpi-item label="Long-press threshold (ms)">
      <sdpi-textfield
        setting="longPressThresholdMs"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="500"
      ></sdpi-textfield>
    </sdpi-item>

    <div class="section">Safety</div>
    <sdpi-item label="Cancel">
      <sdpi-checkbox
        setting="cancelOnSecondPress"
        label="Pressing again aborts the current run"
        default="true"
      ></sdpi-checkbox>
    </sdpi-item>
    <small class="help">
      If unchecked, pressing again will queue another message.
    </small>

    <div class="section">Timing</div>
    <sdpi-item label="Character delay (ms)">
      <sdpi-textfield
        setting="charDelay"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="5"
        default="5"
      ></sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="Word delay (ms)">
      <sdpi-textfield
        setting="wordDelay"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="40"
        default="40"
      ></sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="Paragraph delay (ms)">
      <sdpi-textfield
        setting="paragraphDelay"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="400"
        default="400"
      ></sdpi-textfield>
    </sdpi-item>

    <div class="section">Natural typing</div>
    <sdpi-item label="Jitter">
      <sdpi-checkbox
        setting="jitterEnabled"
        label="Randomize delays"
        default="true"
      ></sdpi-checkbox>
    </sdpi-item>
    <sdpi-item label="Jitter amount (%)">
      <sdpi-textfield
        setting="jitterPercent"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="100"
        default="100"
      ></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Typos">
      <sdpi-checkbox
        setting="typosEnabled"
        label="Occasional adjacent-key typos"
      ></sdpi-checkbox>
    </sdpi-item>
    <sdpi-item label="Typo chance (%)">
      <sdpi-textfield
        setting="typoChance"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="3"
      ></sdpi-textfield>
    </sdpi-item>

    <script>
      // Cycle and Random pick are mutually exclusive — unchecking the
      // counterpart when one is enabled keeps state consistent.
      document.addEventListener("DOMContentLoaded", () => {
        const cycle = document.querySelector('[setting="cycleMode"]');
        const random = document.querySelector('[setting="randomMode"]');
        if (!cycle || !random) return;
        const sync = (changed, other) => {
          changed.addEventListener("valuechanged", (ev) => {
            if (ev.detail?.value === true && other.value === true) {
              other.value = false;
            }
          });
        };
        sync(cycle, random);
        sync(random, cycle);
      });
    </script>
  </body>
</html>
