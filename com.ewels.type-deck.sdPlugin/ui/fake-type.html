<!DOCTYPE html>
<html>

<head lang="en">
    <title>Type Deck Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
</head>

<body>
    <sdpi-item label="Text">
        <sdpi-textarea setting="text" placeholder="Text to type when the key is pressed..." rows="6"></sdpi-textarea>
    </sdpi-item>
    <sdpi-item label="Character delay (ms)">
        <sdpi-textfield setting="charDelay" inputmode="numeric" pattern="[0-9]*" placeholder="5" default="5"></sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="Word delay (ms)">
        <sdpi-textfield setting="wordDelay" inputmode="numeric" pattern="[0-9]*" placeholder="40" default="40"></sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="Paragraph delay (ms)">
        <sdpi-textfield setting="paragraphDelay" inputmode="numeric" pattern="[0-9]*" placeholder="400" default="400"></sdpi-textfield>
    </sdpi-item>
</body>

</html>
