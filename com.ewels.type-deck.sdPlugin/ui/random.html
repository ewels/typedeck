<!doctype html>
<html lang="en">
  <head>
    <title>Type Deck - Random Pick Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
      }
      .help {
        display: block;
        margin: 2px 0 8px;
        color: var(--color-content-secondary, #999);
        font-size: 11px;
        line-height: 1.4;
      }
      .section {
        margin-top: 14px;
        padding-top: 6px;
        border-top: 1px solid var(--color-border, #444);
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--color-content-secondary, #999);
      }
    </style>
  </head>

  <body>
    <div class="section">Lines</div>
    <sdpi-item label="Lines">
      <sdpi-textarea
        setting="text"
        placeholder="One entry per line..."
        rows="6"
      ></sdpi-textarea>
    </sdpi-item>
    <small class="help">
      Each press types a randomly chosen non-empty line. Template variables:
      <code>{date}</code> = YYYY-MM-DD, <code>{time}</code> = HH:MM:SS,
      <code>{clipboard}</code> = current clipboard text,
      <code>{counter}</code> = press count. Use <code>{{</code> and
      <code>}}</code> for literal braces.
    </small>

    <div class="section">Safety</div>
    <sdpi-item label="Cancel">
      <sdpi-checkbox
        setting="cancelOnSecondPress"
        label="Pressing again aborts the current run"
        default="true"
      ></sdpi-checkbox>
    </sdpi-item>
    <small class="help">
      If unchecked, pressing again will queue another message.
    </small>

    <div class="section">Timing</div>
    <sdpi-item label="Character delay (ms)">
      <sdpi-textfield
        setting="charDelay"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="5"
        default="5"
      ></sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="Word delay (ms)">
      <sdpi-textfield
        setting="wordDelay"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="40"
        default="40"
      ></sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="Paragraph delay (ms)">
      <sdpi-textfield
        setting="paragraphDelay"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="400"
        default="400"
      ></sdpi-textfield>
    </sdpi-item>

    <div class="section">Natural typing</div>
    <sdpi-item label="Jitter">
      <sdpi-checkbox
        setting="jitterEnabled"
        label="Randomize delays"
        default="true"
      ></sdpi-checkbox>
    </sdpi-item>
    <sdpi-item label="Jitter amount (%)">
      <sdpi-textfield
        setting="jitterPercent"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="100"
        default="100"
      ></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Typos">
      <sdpi-checkbox
        setting="typosEnabled"
        label="Occasional adjacent-key typos"
      ></sdpi-checkbox>
    </sdpi-item>
    <sdpi-item label="Typo chance (%)">
      <sdpi-textfield
        setting="typoChance"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="3"
      ></sdpi-textfield>
    </sdpi-item>
  </body>
</html>
