name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - run: npm ci

      - run: npm run build

      - name: Stage runtime deps inside the plugin folder
        # The rollup build keeps `@nut-tree-fork/libnut` (and its platform
        # sub-packages) external. `@nut-tree-fork/libnut` lists all three
        # `libnut-{darwin,win32,linux}` packages as regular deps, so a plain
        # `npm install` here pulls every platform's `.node` binary — no
        # `--os` gymnastics required.
        run: |
          set -euo pipefail
          cat > com.ewels.type-deck.sdPlugin/package.json <<'EOF'
          {
            "type": "module",
            "private": true,
            "dependencies": {
              "@nut-tree-fork/libnut": "^4.2.6"
            }
          }
          EOF
          cd com.ewels.type-deck.sdPlugin
          npm install --omit=dev --no-package-lock --no-fund --no-audit

      - name: Pack
        run: npx --no-install streamdeck pack com.ewels.type-deck.sdPlugin --force

      - name: Attach .streamDeckPlugin to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" com.ewels.type-deck.streamDeckPlugin --clobber
